<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#07080A"/>

  <!-- Subtle green glow -->
  <circle cx="256" cy="256" r="180" fill="rgba(45,158,107,0.08)"/>

  <!-- Border accent -->
  <rect width="512" height="512" rx="96" fill="none" stroke="rgba(45,158,107,0.3)" stroke-width="8"/>

  <!-- Monogram "CS" — Instrument Serif style -->
  <!-- C -->
  <text
    x="108"
    y="310"
    font-family="Georgia, serif"
    font-size="210"
    font-weight="400"
    font-style="italic"
    fill="#EDF2ED"
    letter-spacing="-8"
  >C</text>

  <!-- S — accent green -->
  <text
    x="258"
    y="310"
    font-family="Georgia, serif"
    font-size="210"
    font-weight="400"
    font-style="italic"
    fill="#2D9E6B"
    letter-spacing="-8"
  >S</text>

  <!-- Dot accent -->
  <circle cx="460" cy="290" r="18" fill="#4ECBA8" opacity="0.8"/>
</svg>
